
# Application

spring.application.name=api-gateway
server.port=9095

# Spring Cloud Gateway Routes

# Spring Cloud Gateway Routes (FIXED)
spring.cloud.gateway.server.webmvc.routes[0].id=book-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://book-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/books/**

spring.cloud.gateway.server.webmvc.routes[1].id=fine-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://fine-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/fines/**

spring.cloud.gateway.server.webmvc.routes[2].id=loan-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://loan-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/loan/**

spring.cloud.gateway.server.webmvc.routes[3].id=user-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://user-service
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/users/**


# Eureka Configuration

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true                         


# Static Resources (Frontend)                  # ← ADDED SECTION


# Actuator

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.gateway.enabled=true                       


# Zipkin / Tracing

spring.zipkin.base-url=http://localhost:9411
spring.sleuth.sampler.probability=1.0
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411
management.tracing.enabled=false


# Spring Boot Admin Client                     # ← ADDED SECTION (you have the dependency in pom.xml)

spring.boot.admin.client.url=http://localhost:8900
spring.boot.admin.client.instance.name=api-gateway
spring.boot.admin.client.enabled=false

# Logging (optional but useful during dev)     # ← ADDED SECTION

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.web=DEBUG
spring.devtools.livereload.enabled=false