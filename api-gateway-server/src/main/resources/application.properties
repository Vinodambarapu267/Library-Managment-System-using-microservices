# Application
spring.application.name=api-gateway
server.port=9095

# Spring Cloud Gateway Routes
spring.cloud.gateway.mvc.routes[0].id=book-service
spring.cloud.gateway.mvc.routes[0].uri=http://localhost:9090
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/books/**


spring.cloud.gateway.mvc.routes[1].id=fine-service
spring.cloud.gateway.mvc.routes[1].uri=http://localhost:9093
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/fines/**


spring.cloud.gateway.mvc.routes[2].id=loan-service
spring.cloud.gateway.mvc.routes[2].uri=http://localhost:9092
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/loan/**


spring.cloud.gateway.mvc.routes[3].id=user-service
spring.cloud.gateway.mvc.routes[3].uri=http://localhost:9091
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/api/users/**


# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true


# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always


