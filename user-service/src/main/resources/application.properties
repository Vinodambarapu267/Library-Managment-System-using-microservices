spring.application.name=user-service
server.port=9091
#database configurations
spring.datasource.url=jdbc:mysql://localhost:3306/library_db
spring.datasource.username=root
spring.datasource.password=vinod267
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#eureka configuration

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

#actuator configurations
management.endpoints.web.exposure.include=*

#admin - server 
spring.boot.admin.client.url=http://localhost:8900/admin
spring.boot.admin.client.enabled=false

# Zipkin Configuration
spring.zipkin.base-url=http://localhost:9411

# Sleuth Sampling (Legacy - still works)
spring.sleuth.sampler.probability=1.0

# Micrometer Tracing Sampling (Spring Boot 3+)
management.tracing.sampling.probability=1.0

#redis configurations
spring.cache.type=redis
spring.cache.cache-names=libraryusers,UserRoleStatus
spring.data.redis.host=localhost
spring.data.redis.port=6379

